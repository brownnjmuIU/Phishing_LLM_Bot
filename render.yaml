# Blueprint for Render: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agent-chat
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Required: free Hugging Face token (Inference Providers)
      # - key: HF_TOKEN
      #   sync: false
      # Optional: long system prompt (overrides config/agent_instructions.txt)
      # - key: AGENT_SYSTEM_PROMPT
      #   sync: false
