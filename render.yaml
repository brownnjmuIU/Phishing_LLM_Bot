services:
  - type: web
    name: phishing-awareness-simulator
    env: python
    plan: free
    # Install CPU torch first; otherwise transformers’ dependency pulls CUDA torch from PyPI.
    buildCommand: pip install --upgrade pip && pip install torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Without this, Render uses Python 3.14; pydantic-core then builds from source (Rust) and fails on read-only FS.
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 10000