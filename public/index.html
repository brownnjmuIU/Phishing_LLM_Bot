<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Agent chat</h1>
        <p class="subtitle">Powered by your configured system prompt on the server.</p>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <form class="composer" id="form" autocomplete="off">
        <label class="sr-only" for="input">Message</label>
        <textarea
          id="input"
          rows="2"
          placeholder="Message the agent…"
          required
        ></textarea>
        <button type="submit" id="send">Send</button>
      </form>
      <p class="hint" id="status"></p>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
